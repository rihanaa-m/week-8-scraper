version: 2

models:
  - name: stg_telegram_messages
    description: "Staging table for Telegram messages with cleaned and standardized data"
    columns:
      - name: message_id
        description: "Unique identifier for each message"
        tests:
          - not_null
      - name: channel_name
        description: "Name of the Telegram channel"
        tests:
          - not_null
      - name: message_date
        description: "Timestamp of the message"
        tests:
          - not_null
      - name: message_text
        description: "Full text content of the message"
      - name: has_media
        description: "Whether the message contains media"
      - name: image_path
        description: "Path to downloaded image"
      - name: views
        description: "Number of views on the message"
        tests:
          - dbt_utils.expression_is_true:
              expression: "views >= 0"
      - name: forwards
        description: "Number of times the message was forwarded"
        tests:
          - dbt_utils.expression_is_true:
              expression: "forwards >= 0"
      - name: message_length
        description: "Character count of message text"
        tests:
          - dbt_utils.expression_is_true:
              expression: "message_length >= 0"

  - name: dim_dates
    description: "Date dimension table with comprehensive date attributes"
    columns:
      - name: date_key
        description: "Surrogate key in YYYYMMDD format"
        tests:
          - unique
          - not_null
      - name: full_date
        description: "Complete date value"
        tests:
          - unique
          - not_null
      - name: day_of_week
        description: "Numeric day of week (1-7)"
      - name: day_name
        description: "Day name"
      - name: week_of_year
        description: "Week number within the year"
      - name: month
        description: "Numeric month (1-12)"
      - name: month_name
        description: "Month name"
      - name: quarter
        description: "Quarter of year (1-4)"
      - name: year
        description: "Year value"
      - name: is_weekend
        description: "Boolean flag for weekend days"

  - name: dim_channels
    description: "Channel dimension table with aggregated statistics"
    columns:
      - name: channel_key
        description: "Surrogate key for unique channel identification"
        tests:
          - unique
          - not_null
      - name: channel_name
        description: "Original Telegram channel name"
        tests:
          - unique
          - not_null
      - name: first_post_date
        description: "Date of first message from this channel"
      - name: last_post_date
        description: "Date of most recent message from this channel"
      - name: total_posts
        description: "Count of all messages from this channel"
        tests:
          - dbt_utils.expression_is_true:
              expression: "total_posts > 0"
      - name: avg_views
        description: "Average view count across all messages"
      - name: total_views
        description: "Total views across all messages"
      - name: total_forwards
        description: "Total forwards across all messages"
      - name: messages_with_media
        description: "Count of messages containing media"
      - name: media_percentage
        description: "Percentage of messages with media"

  - name: fct_messages
    description: "Fact table for messages with foreign keys to dimensions"
    columns:
      - name: message_id
        description: "Unique message identifier"
        tests:
          - not_null
      - name: channel_key
        description: "Foreign key to dim_channels"
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        description: "Foreign key to dim_dates"
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: message_text
        description: "Full message content"
      - name: message_length
        description: "Character count of message text"
      - name: view_count
        description: "Number of views"
        tests:
          - dbt_utils.expression_is_true:
              expression: "view_count >= 0"
      - name: forward_count
        description: "Number of forwards"
        tests:
          - dbt_utils.expression_is_true:
              expression: "forward_count >= 0"
      - name: has_image_flag
        description: "Boolean indicating image presence"
      - name: image_path
        description: "Path to downloaded image"
